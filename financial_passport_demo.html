  .stage { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; position: relative; }

  /* Background gradient */
  .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 50%, #0a3a6b 0%, #061F32 60%); z-index: 0; }

  /* Header */
  .hdr { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: rgba(6,31,50,0.95); border-bottom: 1px solid rgba(0,167,242,0.3); }
  .hdr-brand { font-size: 15px; font-weight: 700; color: #00A7F2; letter-spacing: 0.04em; }
  .hdr-badge { font-size: 11px; color: rgba(255,255,255,0.5); background: rgba(0,167,242,0.12); border: 1px solid rgba(0,167,242,0.3); padding: 3px 10px; border-radius: 20px; }
  .step-dots { display: flex; gap: 8px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.3s; }
  .dot.active { background: #00A7F2; transform: scale(1.3); }
  .dot.done { background: rgba(0,167,242,0.5); }

  /* Phone frame */
  .phone-wrap { position: relative; z-index: 10; display: flex; align-items: center; gap: 40px; }
  .phone { width: 280px; background: #0d1b2a; border-radius: 40px; border: 2px solid rgba(255,255,255,0.15); box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,167,242,0.1); overflow: hidden; position: relative; }
  .phone::before { content: ''; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); width: 80px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; z-index: 10; }
  .phone-inner { padding-top: 28px; height: 560px; position: relative; overflow: hidden; }

  /* Screens */
  .screen { position: absolute; inset: 0; padding: 24px 18px 16px; opacity: 0; transform: translateX(30px); transition: all 0.5s cubic-bezier(0.4,0,0.2,1); pointer-events: none; }
  .screen.active { opacity: 1; transform: translateX(0); pointer-events: all; }
  .screen.out { opacity: 0; transform: translateX(-30px); }

  /* Screen elements */
  .screen-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .screen-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 20px; }
  .avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, #00A7F2, #1C3CDF); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .verified-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(0,200,120,0.15); border: 1px solid rgba(0,200,120,0.4); color: #00C878; border-radius: 20px; padding: 2px 10px; font-size: 10px; font-weight: 600; margin-bottom: 16px; }
  .score-card { background: rgba(0,167,242,0.1); border: 1px solid rgba(0,167,242,0.3); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
  .score-label { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .score-row { display: flex; align-items: baseline; gap: 8px; }
  .score-val { font-size: 28px; font-weight: 800; color: #00A7F2; }
  .score-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .gfhs-grade { font-size: 48px; font-weight: 900; color: #F8BC3B; line-height: 1; }
  .gfhs-label { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .dim-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .dim-label { font-size: 9px; color: rgba(255,255,255,0.5); }
  .dim-val { font-size: 9px; color: #00A7F2; font-weight: 600; }
  .bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; flex: 1; margin: 0 8px; }
  .bar-fill { height: 100%; background: #00A7F2; border-radius: 2px; transition: width 1s ease; }
  .section-hdr { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin: 14px 0 8px; }
  .data-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
  .data-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .data-text { font-size: 10px; color: rgba(255,255,255,0.7); }
  .data-check { margin-left: auto; font-size: 11px; color: #00C878; }
  .consent-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; background: rgba(255,255,255,0.04); border-radius: 10px; margin-bottom: 8px; }
  .consent-label { font-size: 10px; color: rgba(255,255,255,0.8); }
  .toggle { width: 36px; height: 20px; background: #00A7F2; border-radius: 10px; position: relative; cursor: pointer; }
  .toggle.off { background: rgba(255,255,255,0.2); }

  .success-msg { font-size: 13px; font-weight: 700; color: #00C878; margin-bottom: 6px; }
  .success-sub { font-size: 10px; color: rgba(255,255,255,0.5); line-height: 1.5; }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 4px; height: 4px; margin: 12px 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #00A7F2, #00C878); border-radius: 4px; width: 0; transition: width 2s ease; }

  /* Info panel next to phone */
  .info-panel { width: 320px; }
  .step-num { font-size: 60px; font-weight: 900; color: rgba(0,167,242,0.15); line-height: 1; margin-bottom: -8px; }
  .step-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .step-desc { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.7; margin-bottom: 20px; }
  .step-highlight { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; background: rgba(0,167,242,0.08); border: 1px solid rgba(0,167,242,0.2); border-radius: 10px; padding: 10px 12px; }
  .hl-icon { font-size: 16px; margin-top: 1px; }
  .hl-text { font-size: 11px; color: rgba(255,255,255,0.7); line-height: 1.5; }
  .hl-text strong { color: #00A7F2; font-weight: 600; }

  /* CTA button */
  .cta-btn { display: block; width: 100%; padding: 14px; background: #00A7F2; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; transition: 0.2s; margin-top: 20px; letter-spacing: 0.02em; }

  .cta-btn:active { transform: translateY(0); }

  .bottom-progress { flex: 1; margin: 0 24px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .bottom-progress-fill { height: 100%; background: #00A7F2; border-radius: 2px; transition: width 0.5s ease; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn { padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff; font-size: 12px; cursor: pointer; transition: 0.2s; }

  .nav-btn.primary-btn { background: #00A7F2; border-color: #00A7F2; font-weight: 600; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .animate-in { animation: slideUp 0.5s ease forwards; }
</style>

          </div>
          <div style="font-size:11px; color:rgba(255,255,255,0.6); line-height:1.6">
            <span style="color:#00A7F2; font-weight:700">Financial Passport</span><br>
            Your financial identity<br>travels with you.
          </div>
        </div>
      </div>
    `
  },
];

let current = 0;

function renderDots() {
  const d = document.getElementById('dots');
  d.innerHTML = steps.map((_, i) =>
    `<div class="dot ${i === current ? 'active' : i < current ? 'done' : ''}"></div>`
  ).join('');
}

function renderInfo() {
  const p = document.getElementById('infoPanel');
  const s = steps[current];
  p.innerHTML = `
    <div class="step-num">${s.num}</div>
    <div class="step-title" style="white-space:pre-line">${s.title}</div>
    <div class="step-desc">${s.desc}</div>
    ${s.highlights.map(h => `
      <div class="step-highlight">
        <div class="hl-icon">${h.icon}</div>
        <div class="hl-text">${h.text}</div>
      </div>
    `).join('')}
  `;
}

function renderPhone() {
  const inner = document.getElementById('phoneInner');
  inner.innerHTML = steps[current].screen;
  // Start progress animation on step 0
  if (current === 0) {
    setTimeout(() => {
      const p1 = document.getElementById('p1');
      if (p1) p1.style.width = '65%';
    }, 400);
  }
}

function updateBottom() {
  document.getElementById('stepNum').textContent = current + 1;
  document.getElementById('bpFill').style.width = ((current + 1) / steps.length * 100) + '%';
  document.getElementById('nextBtn').textContent = current === steps.length - 1 ? '↺ Restart' : 'Next →';
}

function render() {
  renderDots();
  renderInfo();
  renderPhone();
  updateBottom();
}

function next() {
  if (current === steps.length - 1) { current = 0; }
  else { current++; }
  render();
}

function prev() {
  if (current > 0) { current--; render(); }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
});

render();
</script>
</body>
</html>
